name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare Frontend Build Directory
        run: |
          mkdir public
          # Copy HTML files
          cp *.html public/ || true
          cp favicon.svg public/ || true
          cp manifest.json public/ || true
          
          # Copy directories if they exist
          [ -d "assets" ] && cp -r assets public/ || true
          [ -d "styles" ] && cp -r styles public/ || true
          [ -d "scripts" ] && cp -r scripts public/ || true
          
          # Ensure backend/database is excluded just in case
          rm -rf public/backend
          rm -rf public/database

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
