services:
  # ── Redis ─────────────────────────────────────────────────────────
  - type: redis
    name: clipforge-redis
    ipAllowList: [] # only allow internal connections
    plan: free
    maxmemoryPolicy: allkeys-lru

  # ── FastAPI Backend ───────────────────────────────────────────────
  - type: web
    name: clipforge-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clipforge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: clipforge-redis
          property: connectionString
      - key: CELERY_BROKER
        fromService:
          type: redis
          name: clipforge-redis
          property: connectionString
      - key: CELERY_BACKEND
        fromService:
          type: redis
          name: clipforge-redis
          property: connectionString
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"

  # ── Celery Worker ─────────────────────────────────────────────────
  - type: worker
    name: clipforge-worker
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: celery -A app.workers.job_worker.celery_app worker --loglevel=info --concurrency=2
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clipforge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: clipforge-redis
          property: connectionString
      - key: CELERY_BROKER
        fromService:
          type: redis
          name: clipforge-redis
          property: connectionString
      - key: CELERY_BACKEND
        fromService:
          type: redis
          name: clipforge-redis
          property: connectionString
      - key: APP_ENV
        value: production

databases:
  # ── PostgreSQL ────────────────────────────────────────────────────
  - name: clipforge-db
    databaseName: clipforge_db
    user: clipforge
    plan: free
