version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: clipforge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clipforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: clipforge_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker + cache) ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: clipforge_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clipforge_api
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://clipforge:${POSTGRES_PASSWORD:-password}@postgres:5432/clipforge_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER=redis://redis:6379/0
      - CELERY_BACKEND=redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./models:/app/models    # YOLO model files
      - clip_tmp:/tmp/clips
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker (CPU tasks) ─────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clipforge_worker
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://clipforge:${POSTGRES_PASSWORD:-password}@postgres:5432/clipforge_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER=redis://redis:6379/0
      - CELERY_BACKEND=redis://redis:6379/1
    depends_on:
      - api
      - redis
    volumes:
      - ./backend:/app
      - ./models:/app/models
      - clip_tmp:/tmp/clips
    command: celery -A app.workers.job_worker.celery_app worker --loglevel=info --concurrency=2
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]    # Remove if no GPU

  # ── Celery Beat (scheduled tasks) ────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clipforge_beat
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://clipforge:${POSTGRES_PASSWORD:-password}@postgres:5432/clipforge_db
      - CELERY_BROKER=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    command: celery -A app.workers.job_worker.celery_app beat --loglevel=info

  # ── Flower (Celery monitoring UI) ─────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: clipforge_flower
    restart: unless-stopped
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis

  # ── Nginx reverse proxy ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: clipforge_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro  # serve static frontend
      - nginx_certs:/etc/letsencrypt
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  clip_tmp:
  nginx_certs:
