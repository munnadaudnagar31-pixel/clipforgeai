# ─────────────────────────────────────────────────────────────────
# ClipForge AI — Nginx Reverse Proxy Configuration
# ─────────────────────────────────────────────────────────────────
#
# Architecture:
#   Browser → Nginx (port 80/443)
#               ├── /api/*   → FastAPI  (api:8000)
#               └── /*       → Static frontend files
#
# Production TLS: uncomment the HTTPS server block and point
# ssl_certificate to your Let's Encrypt certs.
# ─────────────────────────────────────────────────────────────────

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;   # hide nginx version

    # ── Compression ───────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml;

    # ── Upload size (for video uploads) ───────────────────────────
    client_max_body_size 2048M;
    client_body_timeout  600s;

    # ── Rate limiting (protect API) ───────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ── Upstream (FastAPI) ────────────────────────────────────────
    upstream fastapi {
        server api:8000;
        keepalive 32;
    }

    # ── HTTP Server ───────────────────────────────────────────────
    server {
        listen 80;
        server_name _;   # catch-all; replace with clipforge.ai in production

        # ── API reverse proxy ─────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Timeouts (long for video upload + AI processing)
            proxy_connect_timeout 60s;
            proxy_send_timeout    600s;
            proxy_read_timeout    600s;

            # WebSocket support (for future real-time progress)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Auth endpoints — stricter rate limit ──────────────────
        location /api/auth/token {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://fastapi;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Stripe webhook (no rate limit — Stripe needs reliability)
        location /api/webhooks/ {
            proxy_pass       http://fastapi;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Preserve raw body for Stripe signature verification
            proxy_request_buffering off;
        }

        # ── FastAPI Swagger docs ───────────────────────────────────
        location /api/docs {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
        }
        location /api/redoc {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
        }

        # ── Static frontend ───────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ $uri.html /index.html;

            # Cache static assets aggressively
            location ~* \.(css|js|woff2?|ttf|otf|svg|ico)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }

            # Don't cache HTML (always fresh)
            location ~* \.html$ {
                expires -1;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }
        }

        # Custom error pages
        error_page 404 /404.html;
        location = /404.html { root /usr/share/nginx/html; internal; }
        error_page 500 502 503 504 /404.html;

        # ── Security headers ──────────────────────────────────────
        add_header X-Content-Type-Options  "nosniff"        always;
        add_header X-Frame-Options         "SAMEORIGIN"     always;
        add_header X-XSS-Protection        "1; mode=block"  always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    }

    # ── HTTPS Server (uncomment in production) ────────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name clipforge.ai www.clipforge.ai;
    #
    #     ssl_certificate     /etc/letsencrypt/live/clipforge.ai/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/clipforge.ai/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    #
    #     # Include all location blocks from HTTP server here
    # }
    #
    # # Redirect HTTP → HTTPS
    # server {
    #     listen 80;
    #     server_name clipforge.ai www.clipforge.ai;
    #     return 301 https://$host$request_uri;
    # }
}
