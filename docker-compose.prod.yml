# docker-compose.prod.yml — ClipForge AI Production Overrides
#
# Usage (merge with base compose):
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file OVERRIDES the base docker-compose.yml for production:
#   - No source volume mounts (use built image only)
#   - No --reload flags
#   - Resource limits set
#   - Flower removed (not needed in prod)
#   - Restart always
#   - Nginx serves real SSL certs

version: "3.9"

services:

  # ── PostgreSQL (production tuning) ───────────────────────────
  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}   # must be set in .env, no default
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c maintenance_work_mem=128MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  # ── FastAPI Backend ───────────────────────────────────────────
  api:
    restart: always
    volumes: []                                  # no source code mount in prod
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --workers 4
        --log-level warning
        --access-log
        --proxy-headers
        --forwarded-allow-ips='*'
    environment:
      - DEBUG=false
      - APP_ENV=production
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Celery Worker ─────────────────────────────────────────────
  worker:
    restart: always
    volumes: []                                  # no source code mount in prod
    command: >
      celery -A app.workers.job_worker.celery_app worker
        --loglevel=warning
        --concurrency=4
        --max-tasks-per-child=50
        --pool=prefork
    environment:
      - APP_ENV=production
    deploy:
      resources:
        limits:
          memory: 4G                             # AI/CV processing is memory-heavy
        reservations:
          memory: 2G

  # ── Celery Beat ───────────────────────────────────────────────
  beat:
    restart: always
    volumes: []
    command: >
      celery -A app.workers.job_worker.celery_app beat
        --loglevel=warning
        --scheduler celery.beat:PersistentScheduler

  # ── Publish Worker ────────────────────────────────────────────
  publish_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clipforge_publish
    restart: always
    env_file: .env
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+psycopg2://clipforge:${POSTGRES_PASSWORD}@postgres:5432/clipforge_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER=redis://redis:6379/0
      - CELERY_BACKEND=redis://redis:6379/1
    depends_on:
      - api
      - redis
    command: >
      celery -A app.workers.publish_worker.celery_app worker
        --loglevel=warning
        --concurrency=2
        --queues=publish
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Nginx (production SSL) ────────────────────────────────────
  nginx:
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./:/usr/share/nginx/html:ro              # serve static frontend
      - nginx_certs:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 3

  # ── Flower DISABLED in production ────────────────────────────
  flower:
    profiles: ["dev"]                            # only starts with --profile dev

volumes:
  postgres_data:
  redis_data:
  clip_tmp:
  nginx_certs:
